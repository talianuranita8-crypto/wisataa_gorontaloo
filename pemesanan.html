<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pemesanan - Gorontalo Utara</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f8f0; color: #1a3a1a; line-height: 1.6; }
        .navbar { background-color: #1e5a3a; color: white; padding: 1rem 2rem; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: #ffd966; }
        .hamburger { font-size: 2rem; cursor: pointer; background: none; border: none; color: white; display: none; }
        .nav-menu { display: flex; list-style: none; gap: 1rem; flex-wrap: wrap; }
        .nav-menu li a { color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 5px; transition: background 0.3s; }
        .nav-menu li a:hover { background-color: #ffd966; color: #1e5a3a; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 2rem; }
        .form-box { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #1e5a3a; color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #ffd966; color: #1e5a3a; }
        footer { background-color: #1e5a3a; color: white; text-align: center; padding: 1rem; margin-top: 2rem; }
        @media (max-width: 768px) { .hamburger { display: block; } .nav-menu { display: none; width: 100%; flex-direction: column; margin-top: 1rem; } .nav-menu.show { display: flex; } .nav-menu li { text-align: center; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Pesona<span>Gorut</span></div>
        <button class="hamburger" id="hamburger">☰</button>
        <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html">Beranda</a></li>
            <li><a href="destinasi.html">Destinasi</a></li>
            <li><a href="aktivitas.html">Aktivitas</a></li>
            <li><a href="budaya.html">Budaya</a></li>
            <li><a href="kuliner.html">Kuliner</a></li>
            <li><a href="perencana.html">Perencana</a></li>
            <li><a href="itinerary.html">Itinerary</a></li>
            <li><a href="akomodasi.html">Akomodasi</a></li>
            <li><a href="keberlanjutan.html">Keberlanjutan</a></li>
            <li><a href="bantuan.html">Bantuan</a></li>
            <li><a href="pesanan.html">Pesanan</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="form-box">
            <h2>Form Pemesanan Paket Wisata</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Nomor WhatsApp</label>
                    <input type="tel" id="wa" required>
                </div>
                <div class="form-group">
                    <label>Paket Wisata</label>
                    <select id="paket">
                        <option>Paket Petualangan (3H2M) - Rp 1.2 Juta</option>
                        <option>Paket Keluarga (5H4M) - Rp 2.5 Juta</option>
                        <option>Paket Romantis (4H3M) - Rp 3 Juta</option>
                        <option>Paket Off the Beaten Path (14H) - Rp 8 Juta</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tanggal Kunjungan</label>
                    <input type="date" id="tanggal" required>
                </div>
                <div class="form-group">
                    <label>Jumlah Peserta</label>
                    <input type="number" id="jumlah" min="1" value="1" required>
                </div>
                <button type="submit">Simpan Pesanan</button>
            </form>
            <div id="hasilPesan" style="margin-top: 1rem; padding: 1rem; background: #e6f2e6; border-radius: 10px; display: none;"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Pesona Gorontalo Utara</p>
    </footer>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');
        hamburger.addEventListener('click', () => { navMenu.classList.toggle('show'); });

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let nama = document.getElementById('nama').value;
            let email = document.getElementById('email').value;
            let wa = document.getElementById('wa').value;
            let paket = document.getElementById('paket').value;
            let tanggal = document.getElementById('tanggal').value;
            let jumlah = document.getElementById('jumlah').value;

            let pesanan = { nama, email, wa, paket, tanggal, jumlah, tanggalPesan: new Date().toISOString() };
            localStorage.setItem('pesananGorut', JSON.stringify(pesanan));
            
            let hasilDiv = document.getElementById('hasilPesan');
            hasilDiv.style.display = 'block';
            hasilDiv.innerHTML = `✅ Pesanan berhasil disimpan!<br>Nama: ${nama}<br>Paket: ${paket}<br>Tanggal: ${tanggal}<br>Jumlah: ${jumlah} orang<br><br>📋 Data tersimpan di LocalStorage browser. Cek konsol (F12).`;
            console.log("Data pesanan:", pesanan);
            
            // Optional: reset form
            // this.reset();
        });
    </script>
</body>
  </html>
